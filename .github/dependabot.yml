version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday" 
    labels:
      - "dependencies"
      - "ci-cd"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
      include: "scope"
      
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "powershell-modules"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    target-branch: "main"