          exit 1

  # Consolidate reports from all runners
  consolidate-reports:
    name: Consolidate Health Reports
    needs: [check-runner-health-ar1, check-runner-health-ar2]
    runs-on: [self-hosted, Linux, X64, AR1]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      
      - name: Create summary report
        shell: bash
        run: |
          REPORT_DIR="results/health-reports"
          mkdir -p $REPORT_DIR
          DATE=$(date +%Y%m%d)
          
          # Create consolidated report
          cat > $REPORT_DIR/consolidated_health_${DATE}.txt <<EOL
          Consolidated Runner Health Report - $(date)
          ==========================================
          
          This report combines the health status from all runners.
          Individual runner reports are available in the same directory.
          
          Overall Status: ${{ (needs.check-runner-health-ar1.result == 'success' && needs.check-runner-health-ar2.result == 'success') && 'HEALTHY ✓' || 'ISSUES DETECTED ⚠️' }}
          
          Run ID: ${{ github.run_id }}
          Report Date: $(date)
          
          View detailed job results at: 
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOL
          
          echo "## Runner Status Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **AR1 & AR2 Health Check Completed**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ (needs.check-runner-health-ar1.result == 'success' && needs.check-runner-health-ar2.result == 'success') && '✓ All Systems Operational' || '⚠️ Issues Detected' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Runner health checks help ensure threat hunting workflows run properly." >> $GITHUB_STEP_SUMMARY
      
      - name: Send report to 1Password
        if: always()
        uses: 1password/load-secrets-action@v1
        with:
          operation: "op item create"
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_WRITE }}
          TITLE: "Runner Health Status - $(date +%Y-%m-%d)"
          VAULT: "Security Automation"
          CATEGORY: "Secure Note"
          NOTESPLAIN: |
            Runner health check completed
            
            Date: $(date)
            Run ID: ${{ github.run_id }}
            Status: ${{ (needs.check-runner-health-ar1.result == 'success' && needs.check-runner-health-ar2.result == 'success') && 'All systems operational' || 'Issues detected' }}
            
            Access the GitHub Action run for details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}