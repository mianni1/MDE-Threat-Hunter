          echo "Running health check on $RUNNER_NAME runner"
          
          # Check disk space
          DISK_USAGE=$(df -h / | awk 'NR==2 {print $5}' | sed 's/%//')
          echo "disk_usage=$DISK_USAGE" >> $GITHUB_OUTPUT
          
          # Check memory 
          FREE_MEM=$(free -m | awk 'NR==2{printf "%.1f", $4/1024}')
          echo "free_memory_gb=$FREE_MEM" >> $GITHUB_OUTPUT
          
          # Check load average
          LOAD=$(cat /proc/loadavg | awk '{print $1}')
          echo "load_avg=$LOAD" >> $GITHUB_OUTPUT
          
          # Check internet connectivity
          if curl -s --connect-timeout 5 https://www.microsoft.com > /dev/null; then
            echo "connectivity_status=OK" >> $GITHUB_OUTPUT
          else
            echo "connectivity_status=FAIL" >> $GITHUB_OUTPUT
            echo "connectivity_issues=true" >> $GITHUB_OUTPUT
          fi
          
          # Overall status determination
          if [ "$DISK_USAGE" -gt "90" ]; then
            echo "disk_status=CRITICAL" >> $GITHUB_OUTPUT
