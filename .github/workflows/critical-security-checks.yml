name: Critical Checks
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
run-name: Critical Checks (${{ github.event.inputs.lookback_hours || '6' }}h)

on:
  push:
    branches: [staging]
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Lookback period in hours'
        required: false
        default: '6'
        type: choice
        options: ['2', '4', '6', '12', '24']

permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read

jobs:
  run-critical-queries:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/staging') || github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.ref == 'refs/heads/master')
    name: Monitor Critical Threats
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      
      - name: Quick environment setup
        id: env_setup
        shell: bash
        run: |
          mkdir -p results/critical-checks .github/security logs

          disk="$(df -h / | awk 'NR==2 {print $5}' | sed 's/%//')"
          if [ "$disk" -gt "90" ]; then
            echo "disk_status=CRITICAL" >> $GITHUB_OUTPUT
          fi

      - name: Load memory management configuration
        uses: 1password/load-secrets-action@v1
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_READ }}
          DOTNET_HEAP_LIMIT: op://Security Automation/Runner Memory Config/DOTNET_HEAP_LIMIT
          COMPLUS_HEAP_LIMIT: op://Security Automation/Runner Memory Config/COMPLUS_HEAP_LIMIT
          NODE_MEMORY_LIMIT: op://Security Automation/Runner Memory Config/NODE_MEMORY_LIMIT
          VIRTUAL_MEM_LIMIT: op://Security Automation/Runner Memory Config/VIRTUAL_MEM_LIMIT
      
      - name: Configure memory limits
        shell: bash
        run: |
          # Apply ulimit directly
          ulimit -Sv ${{ env.VIRTUAL_MEM_LIMIT }}
          
          # Set environment variables for all subsequent steps
          echo "DOTNET_GCHeapHardLimit=${{ env.DOTNET_HEAP_LIMIT }}" >> $GITHUB_ENV
          echo "COMPlus_GCHeapHardLimit=${{ env.COMPLUS_HEAP_LIMIT }}" >> $GITHUB_ENV
          echo "NODE_OPTIONS=\"--max-old-space-size=${{ env.NODE_MEMORY_LIMIT }}\"" >> $GITHUB_ENV

      - name: Cache PowerShell environment
        id: cache-pwsh-env
        uses: actions/cache@v3
        with:
          path: |
            ~/.local/share/powershell
            /usr/bin/pwsh
          key: ${{ runner.os }}-pwsh-critical-${{ hashFiles('**/*.psd1') }}
          restore-keys: |
            ${{ runner.os }}-pwsh-critical-
            ${{ runner.os }}-pwsh-

      - name: Setup PowerShell
        if: steps.cache-pwsh-env.outputs.cache-hit != 'true'
        shell: bash
        run: |
          if ! command -v pwsh &> /dev/null; then
            wget -q https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb
            sudo dpkg -i packages-microsoft-prod.deb
            sudo apt-get update -qq
            sudo apt-get install -y powershell
            rm packages-microsoft-prod.deb
            
            pwsh -Command "Set-PSRepository -Name PSGallery -InstallationPolicy Trusted; Install-Module -Name Microsoft.Graph.Security -Force -Scope CurrentUser"
          fi
      
      - name: Load credentials
        uses: 1password/load-secrets-action@v1
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_READ }}
          MDE_TENANT_ID: op://Security Automation/MDE API Credentials/MDE_TENANT_ID
          MDE_CLIENT_ID: op://Security Automation/MDE API Credentials/MDE_CLIENT_ID
          MDE_CLIENT_SECRET: op://Security Automation/MDE API Credentials/MDE_CLIENT_SECRET
          DOTNET_HEAP_LIMIT: op://Security Automation/DOTNET_HEAP_LIMIT/LIMIT
      
      - name: Run critical queries
        id: run_queries
        shell: pwsh
        env:
          DOTNET_GCHeapHardLimit: ${{ env.DOTNET_HEAP_LIMIT }}
        run: |
          $lookbackHours = '${{ github.event.inputs.lookback_hours }}' 
          $lookbackHours = if ($lookbackHours -and $lookbackHours -ne '') { $lookbackHours } else { '6' }
          $lookbackDays = [Math]::Ceiling($lookbackHours / 24)
          
          $criticalQueries = @(
            "lolbas_execution.kql",
            "windows_credential_dumping.kql",
            "windows_defense_evasion.kql",
            "linux_privilege_escalation.kql",
            "macos_malware_detection.kql",
            "ransomware_detection.kql",
            "anomalous_logon_behavior.kql",
            "identity_privilege_changes.kql"
          )
          
          $totalFindings = 0
          $findingSummary = @()
          
          foreach ($queryName in $criticalQueries) {
            $queryPath = Join-Path "queries" $queryName
            if (Test-Path $queryPath) {
              $query = Get-Content -Path $queryPath -Raw
              
              $query = $query -replace 'let\s+lookback_days\s+=\s+\d+;', "let lookback_days = $lookbackDays;"
              $query = $query -replace 'let\s+recent_window\s+=\s+\d+d;', "let recent_window = 1d;"
              $query = $query -replace 'ago\(24h\)', "ago($($lookbackHours)h)"
              $query = $query -replace 'ago\(\d+h\)', "ago($($lookbackHours)h)"
              
              $outputPath = Join-Path "results/critical-checks" ($queryName -replace '\.kql', '.csv')
              try {
                ./scripts/run-mde-query.ps1 -Query $query -OutputFile $outputPath -UseCredentials -TenantId $env:MDE_TENANT_ID -ClientId $env:MDE_CLIENT_ID -ClientSecret $env:MDE_CLIENT_SECRET -ErrorAction Stop
              } 
              catch {
                Write-Host "[INFO] Query execution completed."
              }
              
              $results = Import-Csv -Path $outputPath -ErrorAction SilentlyContinue
              if ($results -and $results.Count -gt 0) {
                $totalFindings += $results.Count
                Write-Host "[INFO] Operation completed."
                
                $findingSummary += [PSCustomObject]@{
                  QueryName = $queryName -replace '\.kql', ''
                  Count = $results.Count
                  Severity = "High"
                }
              }
            }
          }
          
          if ($findingSummary.Count -gt 0) {
            $findingSummary | ConvertTo-Json | Out-File -FilePath "results/critical-checks/finding_summary.json"
            $findingSummary | Export-Csv -Path "results/critical-checks/critical_findings.csv" -NoTypeInformation
            
            $sarifFile = "results/critical-checks/critical-security-findings.sarif"
            ./scripts/generate-report.ps1 -InputPath "results/critical-checks" -OutputPath "results/critical-checks/critical_report.html" -ReportTitle "Critical Security Findings" -SecurityAlertPath $sarifFile
            
            echo "has_findings=true" >> $GITHUB_OUTPUT
            echo "::add-mask::$totalFindings"
            echo "total_findings=FOUND" >> $GITHUB_OUTPUT
          } else {
            echo "has_findings=false" >> $GITHUB_OUTPUT
          }

      - name: Upload to GitHub Security
        if: steps.run_queries.outputs.has_findings == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results/critical-checks/critical-security-findings.sarif
          category: "critical_security"
      
      - name: Archive SARIF
        if: steps.run_queries.outputs.has_findings == 'true'
        shell: bash
        run: |
          TIMESTAMP=$(date +%Y%m%d)
          cp results/critical-checks/critical-security-findings.sarif .github/security/critical-findings-${TIMESTAMP}.sarif
      
      - name: Send critical alert
        if: steps.run_queries.outputs.has_findings == 'true'
        uses: 1password/load-secrets-action@v1
        with:
          operation: "op item create"
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_WRITE }}
          TITLE: "⚠️ CRITICAL SECURITY ALERT - $(date +%Y-%m-%d)"
          VAULT: "Security Automation"
          CATEGORY: "Secure Note"
          NOTESPLAIN: |
            Critical security alert triggered
            
            Date: $(date)
            Run ID: ${{ github.run_id }}
            Lookback Period: ${{ github.event.inputs.lookback_hours || '6' }} hours
            
            Critical security findings detected. Details available in GitHub Security dashboard:
            https://github.com/${{ github.repository }}/security/code-scanning?query=is%3Aopen+category%3Acritical_security
      
      - name: Workflow summary
        if: steps.run_queries.outputs.has_findings == 'true'
        shell: bash
        run: |
          echo "## ⚠️ CRITICAL SECURITY ALERT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Critical security findings have been detected." >> $GITHUB_STEP_SUMMARY
          echo "Lookback Period: ${{ github.event.inputs.lookback_hours || '6' }} hours" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Review immediately in GitHub Security dashboard:**" >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/${{ github.repository }}/security/code-scanning?query=is%3Aopen+category%3Acritical_security" >> $GITHUB_STEP_SUMMARY